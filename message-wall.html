<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zestli Message Wall</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"rel="stylesheet"/>
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }
  </style>
</head>

<body class="bg-[#FAF4EA] text-[#245C44]">

  <!-- Header -->
  <header class="bg-white shadow-sm">
    <div class="mx-auto flex max-w-6xl flex-wrap items-center justify-between gap-4 px-4 py-4 sm:px-6 lg:px-8">
        <div class="flex items-center space-x-2">
           <img src="images/logo.jpeg" alt="Zestli Logo" class="h-8 w-8 object-contain">
           <a href="index.html">
             <h1 class="text-2xl font-bold text-[#F75C2F]">Zestli</h1>
           </a>
        </div>

        <button
          type="button"
          class="rounded-full border border-[#245C44] px-4 py-2 text-sm font-semibold md:hidden"
          data-menu-button
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          Menu
        </button>

        <nav class="hidden w-full flex-col gap-3 text-sm font-medium md:flex md:w-auto md:flex-row md:items-center md:gap-6" data-menu>
           <a href="index.html" class="hover:underline">Home</a>
           <a href="index.html#menu" class="hover:underline">Menu</a>
           <a href="blog.html" class="hover:underline">Blog</a>
           <a href="message-wall.html" class="hover:underline">Message Wall</a>
        </nav>
    </div>
  </header>


  <!-- Message Wall Section -->
  <section class="mx-auto max-w-4xl px-4 py-12 sm:px-6 lg:px-8">
    <h2 class="mb-6 text-center text-3xl font-bold sm:text-4xl">Share Your Story</h2>
    <p class="mb-10 text-center text-sm">Read what others are saying about Zestli – and feel free to leave some love 💌</p>

    <div class="space-y-6" data-story-list></div>
    <p class="text-sm text-center text-gray-500 mt-10">New stories are added anonymously after submission ✨</p>
  </section>
  <script src="scripts/story-wall.js"></script>
</body>
</html>
